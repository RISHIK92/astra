services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - nativex-net
    environment:
      - OLLAMA_HOST=0.0.0.0

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.astra.rule=Host(`astra.rishik.codes`)"
      - "traefik.http.routers.astra.entrypoints=websecure"
      - "traefik.http.routers.astra.tls.certresolver=myresolver"
      - "traefik.http.services.astra.loadbalancer.server.port=11434"
      - "traefik.docker.network=nativex-net"

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: |
      sh -c "
        echo 'Waiting for Astra API to come online...'
        until ollama list; do
          echo 'Astra is not ready yet. Retrying in 2 seconds...'
          sleep 2
        done
        
        echo 'Removing old 1.5b model (if it exists)...'
        ollama rm qwen2.5-coder:1.5b || true
        
        echo 'Pulling new 3b model...'
        ollama pull qwen2.5-coder:3b
        
        echo 'Model pulled successfully! Shutting down init container.'
      "

networks:
  nativex-net:
    external: true
volumes:
  ollama_data:
